<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error-container": "#ffdad6",
                        "surface": "#f8f9ff",
                        "on-tertiary-fixed-variant": "#004395",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-secondary-fixed-variant": "#005048",
                        "surface-tint": "#565e74",
                        "tertiary-container": "#001a42",
                        "inverse-primary": "#bec6e0",
                        "surface-container": "#e5eeff",
                        "surface-container-highest": "#d3e4fe",
                        "secondary-fixed": "#71f8e4",
                        "on-secondary-fixed": "#00201c",
                        "tertiary": "#000000",
                        "inverse-surface": "#213145",
                        "outline-variant": "#c6c6cd",
                        "secondary-container": "#6df5e1",
                        "surface-bright": "#f8f9ff",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary-container": "#3980f4",
                        "on-surface-variant": "#45464d",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "on-surface": "#0b1c30",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#001a42",
                        "primary-container": "#131b2e",
                        "surface-dim": "#cbdbf5",
                        "inverse-on-surface": "#eaf1ff",
                        "outline": "#76777d",
                        "background": "#f8f9ff",
                        "primary-fixed": "#dae2fd",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary": "#006b5f",
                        "on-tertiary": "#ffffff",
                        "on-background": "#0b1c30",
                        "on-primary-container": "#7c839b",
                        "primary-fixed-dim": "#bec6e0",
                        "on-primary-fixed": "#131b2e",
                        "secondary-fixed-dim": "#4fdbc8",
                        "on-secondary-container": "#006f64",
                        "on-primary-fixed-variant": "#3f465c",
                        "primary": "#000000",
                        "tertiary-fixed": "#d8e2ff",
                        "surface-container-high": "#dce9ff",
                        "surface-variant": "#d3e4fe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-lg": "2rem",
                        "stack-sm": "0.5rem",
                        "container-margin": "1.5rem",
                        "stack-md": "1rem",
                        "gutter": "1rem"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #131b2e 0%, #006b5f 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
    <!-- Top Section with Gradient Background -->
    <header class="hero-gradient relative overflow-hidden pt-12 pb-24 px-container-margin">
        <!-- Subtle Pattern Overlay -->
        <div class="absolute inset-0 opacity-10 pointer-events-none"
            style="background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuDAyCtOtXQyKMGtcEZXYu4B_u7Xpc2oFMjY5BIV1bkAv2lnhH2UzdB_s-2LfiuhUZF4N8c3WCPV5Lwd1pL4z4O1_BJjvgqKvVp5J9_A_OFkTFU0At8_e1KybzVcpmIKAj13c3OHf2Kn_7O4wKv8RTtxfjO4pv1tmpO5_IFxpxmJXWoVCnSY3eFPa2UHge6-_EvRSswXXNYIF_GEg8ZT6B3IVovArruI_tmFe2VD6XUjPIgGD9yb2Xghtb4usdyXG6C9JIt2Yz1-9COx&quot;); background-size: cover; background-position: center center; mix-blend-mode: overlay;">
        </div>
        <div class="relative z-10 flex flex-col items-center text-center">
            <!-- Brand Identity -->
            <div class="flex items-center gap-3 mb-8">
                <div class="bg-secondary-fixed p-2 rounded-xl shadow-lg">
                    <span class="material-symbols-outlined text-on-secondary-fixed text-4xl"
                        data-icon="shield_person">shield_person</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-white tracking-tight">SafeTKI</h1>
            </div>
            <h2 class="font-headline-sm text-headline-sm text-secondary-fixed mb-2">Selamat Datang di Aplikasi SafeTKI
                !!!</h2>
            <p class="font-body-md text-body-md text-surface-variant opacity-90 max-w-xs mx-auto">Keamanan dan
                kenyamanan perjalanan Anda adalah prioritas kami.</p>
        </div>
    </header>
    <!-- Form Section -->
    <main class="flex-grow flex flex-col items-center -mt-16 px-container-margin pb-stack-lg relative z-20">
        <div class="w-full max-w-md glass-card rounded-3xl shadow-xl p-8 border border-white/20">
            <form class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label class="font-label-md text-label-md text-on-surface" for="email">Alamat Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline"
                            data-icon="mail">mail</span>
                        <input
                            class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-md text-body-md"
                            id="email" placeholder="contoh@email.com" type="email">
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="font-label-md text-label-md text-on-surface" for="password">Kata Sandi</label>
                        <a class="font-label-sm text-label-sm text-secondary hover:text-on-secondary-container transition-colors"
                            href="#">Lupa Kata Sandi?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline"
                            data-icon="lock">lock</span>
                        <input
                            class="w-full pl-12 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition-all font-body-md text-body-md"
                            id="password" placeholder="••••••••" type="password">
                        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface"
                            type="button">
                            <span class="material-symbols-outlined" data-icon="visibility">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Login Button -->
                <button
                    class="w-full bg-primary-container text-white font-headline-sm text-headline-sm py-4 rounded-xl shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                    type="submit">
                    Masuk
                </button>
            </form>
            <!-- Social Login Divider -->
            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-outline-variant"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="px-2 bg-white text-outline font-label-sm text-label-sm">Atau masuk dengan</span>
                </div>
            </div>
            <!-- Biometric/Social Placeholders -->
            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors">
                    <span class="material-symbols-outlined text-primary" data-icon="fingerprint">fingerprint</span>
                    <span class="font-label-md text-label-md">Biometrik</span>
                </button>
                <button
                    class="flex items-center justify-center gap-2 py-3 px-4 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors">

                    <span class="font-label-md text-label-md">Google</span>
                </button>
            </div>
        </div>
        <!-- Footer -->
        <footer class="mt-8 text-center pb-8">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
                Belum memiliki akun?
                <a class="font-label-md text-label-md text-secondary font-bold hover:underline" href="#">Daftar Akun</a>
            </p>
        </footer>
    </main>
    <!-- Support Help Floating Action -->
    <div class="fixed bottom-6 right-6">
        <button
            class="bg-secondary p-4 rounded-full shadow-xl text-white hover:scale-110 active:scale-90 transition-transform flex items-center justify-center">
            <span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
        </button>
    </div>
    <!-- Security Badges Section -->
    <div class="w-full max-w-md mx-auto flex justify-center gap-6 opacity-40 mb-12">
        <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">OJK Verified</span>
        </div>
        <div class="flex items-center gap-1">
            <span class="material-symbols-outlined text-sm" data-icon="encrypted">encrypted</span>
            <span class="text-[10px] font-bold uppercase tracking-widest">256-Bit SSL</span>
        </div>
    </div>


</body>

</html>
